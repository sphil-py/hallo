name: Build macOS App

on: [push]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Standalone App
        run: |
          pyinstaller --onefile --name "MeinProgramm" a_dropdown2.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # ✅ Korrekt: @v4
        with:
          name: macos-app
          path: Users/runner/work/hallo/hallo/dist/MeinProgramm.app
